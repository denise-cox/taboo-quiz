<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Which Cultural Taboo Is Running Your Life? | Denise Soler Cox</title>
<script>
const questions = [
  {
    text: "You just got promoted. Your family's reaction is...",
    sub: "Your tia is already nervous for you. What actually happens?",
    options: [
      { text: "You let yourself feel proud. You sit with it. You don't rush past the moment.", taboo: "healthy" },
      { text: "They celebrate, then someone says 'just don't get too big for your britches.' You laugh. Something in you goes quiet.", taboo: "bajale" },
      { text: "The first question out of anyone's mouth is whether you'll still make it to Sunday dinner. The guilt arrives before the congratulations.", taboo: "lucha" },
      { text: "Nobody says much. In your family, big feelings don't get a lot of airtime. You've always celebrated alone.", taboo: "deso" },
      { text: "Before you finish the sentence someone asks what happens if it doesn't work out. The promotion is three days old.", taboo: "quediran" }
    ]
  },
  {
    text: "Growing up, you learned to manage your body by...",
    sub: "Be honest. What did you learn about how much space you were allowed to take up?",
    options: [
      { text: "Expressing it freely. Your body was yours. Most days it still is.", taboo: "healthy" },
      { text: "Making it smaller. The clothes, the posture, the way you walked into rooms. Disappearing yourself before anyone else could.", taboo: "bajale" },
      { text: "Watching other women get policed and quietly learning the rules by watching what happened to them.", taboo: "deso" },
      { text: "Performing wholesomeness. The right clothes, the right amount of visible. Just enough but never too much.", taboo: "quediran" },
      { text: "Going numb to it. It was easier than feeling watched all the time.", taboo: "trapos" }
    ]
  },
  {
    text: "Growing up, when something hard was happening in your home, the family script was...",
    sub: "Your tia would like you to know she did not authorize this question either.",
    options: [
      { text: "We talked about it. Imperfectly. But we named things.", taboo: "healthy" },
      { text: "Give it another name. 'He's tired.' 'She's sensitive.' 'They have a passionate marriage.'", taboo: "trapos" },
      { text: "Say nothing. Keep moving. The silence was so complete you sometimes wondered if you'd imagined it.", taboo: "deso" },
      { text: "Protect the family name above everything else. What happened at home stayed at home.", taboo: "madre" },
      { text: "You became the peacekeeper. The role found you early and it never really let go.", taboo: "lucha" }
    ]
  },
  {
    text: "You're exhausted and you need a break. What does your inner voice say?",
    sub: "Which of these sounds most like your internal monologue?",
    options: [
      { text: "You take the break. The guilt shows up right on time. You take it anyway.", taboo: "healthy" },
      { text: "Rest feels like disrespecting everything your parents sacrificed. So you push through. Again.", taboo: "lucha" },
      { text: "You don't tell anyone you're struggling. You manage it on the inside where nobody can see.", taboo: "trapos" },
      { text: "You haven't earned the right to rest yet. There's still more to prove. Maybe after the next thing.", taboo: "bajale" },
      { text: "You wonder what your team will think if you're not always available and responsive. You answer the message.", taboo: "quediran" }
    ]
  },
  {
    text: "You catch yourself doing or saying something your mother used to do or say. You feel...",
    sub: "First feeling, before logic kicks in.",
    options: [
      { text: "Amused. Some things are absolutely worth carrying forward.", taboo: "healthy" },
      { text: "A flash of recognition, then a quiet resolve. This stops with me.", taboo: "lucha" },
      { text: "Like you've been caught. Like something is running you that you didn't choose.", taboo: "deso" },
      { text: "Proud. Her strength lives in you and you honor that fully.", taboo: "madre" },
      { text: "Frozen. You can see the pattern clearly. You just don't know how to step out of it yet.", taboo: "quediran" }
    ]
  },
  {
    text: "When you're fully yourself, loud, unfiltered, completely present, the thought that follows is...",
    sub: "Your tia wants to know why you can't just act normal.",
    options: [
      { text: "Nothing. This is just you. You've stopped apologizing for it.", taboo: "healthy" },
      { text: "'That was too much.' The edit arrives before you've even finished.", taboo: "bajale" },
      { text: "'I hope nobody saw that.' The visibility feels like a risk.", taboo: "trapos" },
      { text: "'What are they thinking right now?' The invisible audience takes their seats.", taboo: "quediran" },
      { text: "'Would my mother be proud or embarrassed?' The question arrives automatically.", taboo: "madre" }
    ]
  },
  {
    text: "Something is wrong at work, with your boss, a colleague, the culture. Your default move is...",
    sub: "What do you actually do, not what you wish you did.",
    options: [
      { text: "Handle it yourself. Alone. Asking for help isn't really in your vocabulary.", taboo: "lucha" },
      { text: "Name it and address it. Imperfectly. But you use your voice.", taboo: "healthy" },
      { text: "Manage it behind the scenes. HR is never involved. It stays in the family, so to speak.", taboo: "trapos" },
      { text: "Don't bring it up at all. Some things at work just aren't discussed. You move around it.", taboo: "deso" },
      { text: "Rehearse the conversation for three days, calculating exactly how speaking up will make you look.", taboo: "quediran" }
    ]
  },
  {
    text: "Your mother calls to say she disapproves of a major decision you've made. You...",
    sub: "The real answer, not the one you'd give at Sunday dinner.",
    options: [
      { text: "Hold your ground. With love, with guilt, but you hold it. That's new and it counts.", taboo: "healthy" },
      { text: "Feel like you're abandoning a post. Like choosing yourself is the same as leaving everyone behind.", taboo: "lucha" },
      { text: "The guilt is immediate and crushing. You spend the next three days wondering if she's right.", taboo: "madre" },
      { text: "Say nothing back. You'll process this alone. Conflict lives inside, never out loud.", taboo: "trapos" },
      { text: "Start wondering what everyone else, not just her, will think about this decision.", taboo: "quediran" }
    ]
  },
  {
    text: "There are parts of your story you don't talk about, even to people you trust. This is because...",
    sub: "Reflexively, before you choose your words.",
    options: [
      { text: "Those parts are getting smaller. You've been opening those doors. Slowly.", taboo: "healthy" },
      { text: "What happens in the family stays in the family. That rule runs deep.", taboo: "trapos" },
      { text: "You don't have language for them. Nobody ever gave you the words.", taboo: "deso" },
      { text: "Naming them out loud makes them real in a way that feels dangerous.", taboo: "bajale" },
      { text: "You've decided the people in your life can't hold that much of you. Not safely.", taboo: "madre" }
    ]
  },
  {
    text: "At your most honest, the voice you hear most inside your head sounds like...",
    sub: "Your tia already knows the answer. Do you?",
    options: [
      { text: "It's getting quieter. You're doing the work and it's starting to show up in your life.", taboo: "healthy" },
      { text: "'Que van a pensar?' What will they think? The question that never takes a day off.", taboo: "quediran" },
      { text: "'De eso no se habla.' We don't talk about that. File it away and move on.", taboo: "deso" },
      { text: "'Los trapos sucios se lavan en casa.' Handle it yourself. In private. Always.", taboo: "trapos" },
      { text: "'Bajale dos rayitas.' Don't be so much. Said with love. Still left a mark.", taboo: "bajale" }
    ]
  }
]

const taboos = {
  quediran: {
    phrase: "¿Qué dirán?",
    name: "The fear of what others will say",
    desc: "Ah. The invisible audience. They have excellent seats and terrible opinions. You've been making decisions with them in your head for so long, you don't even notice anymore. Their imagined judgment shapes your choices before you're aware you're making one.",
    patterns: ["You edit yourself in meetings before you even speak", "Other people's opinions feel more real than your own", "Success feels dangerous, it raises the stakes of being watched"],
    next: "Start noticing the question 'what will they think?' before you act on it. You don't need to stop asking it. You need to hear it, name it, and then ask: what do I actually think? Chapter 1 of What Will They Say? is your next step."
  },
  bajale: {
    phrase: "¡Bájale dos rayitas!",
    name: "The compulsion to shrink",
    desc: "Someone actually said this to you like it was helpful. It was not. You were told, directly or indirectly, that your intensity, your ambition, your presence was too much. So you learned to make yourself smaller. Now it's automatic, and it's costing you.",
    patterns: ["You credit the team when the win was yours", "You preface your opinions with apologies", "You feel guilty when you take up space or make a big claim"],
    next: "The work isn't to become louder. It's to stop apologizing for your size. Practice claiming one thing per week, one win, one opinion, one boundary, without softening it first. Chapter 4 of What Will They Say? breaks down exactly why this rule was installed, and how to uninstall it."
  },
  trapos: {
    phrase: "Los trapos sucios se lavan en casa",
    name: "The code of private suffering",
    desc: "The original silent sufferer. That's you. Loyalty meant silence. Strength meant handling it alone. You learned early that sharing what's wrong, at work, in your family, inside yourself, was a form of betrayal. So you've been carrying it all.",
    patterns: ["You never take problems to HR or leadership, ever", "You minimize your struggles, even with people you trust", "You feel relief when things look fine from the outside, even when they aren't"],
    next: "The silence was a survival strategy, honor it for what it was. And then start questioning one small thing: who would it actually hurt if you told the truth about this? Chapter 1 of What Will They Say? starts here."
  },
  deso: {
    phrase: "De eso no se habla",
    name: "The unspoken rule of forbidden topics",
    desc: "There are whole rooms in your inner world with the lights off and the door closed. Some things were simply not discussed. Mental health, trauma, dysfunction, desire, there was an entire map of forbidden territory in your house. You learned to navigate around it so well that now you can barely find the words for what's inside you.",
    patterns: ["You have feelings you can't name because there were no words for them growing up", "Therapy or emotional conversations feel almost physically uncomfortable", "You change the subject instinctively when things get too real"],
    next: "The first act of freedom is just finding language. Name one thing this week, out loud, to someone safe, that has never been named before. Chapter 2 of What Will They Say? is your companion for this."
  },
  lucha: {
    phrase: "La lucha sigue",
    name: "The belief that struggle is the only proof of worth",
    desc: "Rest? In this familia? In this economy? Your people suffered to give you what you have. So ease feels dangerous, like betrayal, like you haven't paid enough yet. You grind not just because you have to, but because resting feels morally wrong.",
    patterns: ["You feel guilty when things go well without a fight", "You use how hard something was as evidence you deserved it", "Rest, joy, and ease trigger shame more than satisfaction"],
    next: "Your inheritance is the sacrifice. It is not the suffering. Chapter 9 of What Will They Say? is specifically about dismantling the belief that struggle is the price of belonging."
  },
  madre: {
    phrase: "Don't dishonor your mother",
    name: "The weight of unconditional loyalty",
    desc: "You have her eyes, her cooking, and apparently her veto power over your major life decisions. Your love for your family, especially your mother, has been one of your greatest strengths. And one of your most invisible constraints. You've learned to read the room, keep the peace, and never do anything that reflects badly on where you came from.",
    patterns: ["You loop family opinion into major decisions automatically", "Disappointing her feels like an identity crisis, not just a disagreement", "You confuse loyalty with self-erasure"],
    next: "Loving your mother and building your own life are not mutually exclusive, even when it feels that way. Chapter 6 of What Will They Say? is the one readers call the hardest to read, and the most necessary."
  }
};

const tabooOrder = ["quediran","bajale","trapos","deso","lucha","madre"];
const tabooShortNames = {
  quediran: "¿Qué dirán?",
  bajale: "Bájale dos rayitas",
  trapos: "Los trapos sucios",
  deso: "De eso no se habla",
  lucha: "La lucha sigue",
  madre: "Don't dishonor your mother"
};

let currentQ = 0;
let scores = {};
let answers = new Array(questions.length).fill(null);
let primaryResult = null;

function startQuiz() {
  show('screen-quiz');
  renderQuestion();
}

function show(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].style.display = 'none';
    screens[i].classList.remove('active');
  }
  var target = document.getElementById(id);
  target.style.display = 'block';
  target.classList.add('active');
  try {
    document.getElementById('quiz-wrap').scrollIntoView({ behavior: 'instant', block: 'start' });
  } catch(e) {}
  try {
    window.parent.scrollTo({ top: document.getElementById('quiz-wrap').getBoundingClientRect().top + window.parent.scrollY - 80, behavior: 'smooth' });
  } catch(e) {}
  try { window.scrollTo(0, 0); } catch(e) {}
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `Question ${currentQ+1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;
  document.getElementById('progress-fill').style.width = `${(currentQ/questions.length)*100}%`;
  document.getElementById('back-btn').style.display = currentQ === 0 ? 'none' : 'block';

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });
  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = answers[currentQ] === null;
  nextBtn.textContent = currentQ === questions.length - 1 ? 'See my results →' : 'Next →';
}

function selectOption(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ === questions.length - 1) {
    calculateScores();
    show('screen-capture');
    return;
  }
  currentQ++;
  renderQuestion();
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function calculateScores() {
  scores = { quediran:0, bajale:0, trapos:0, deso:0, lucha:0, madre:0 };
  questions.forEach((q, qi) => {
    if (answers[qi] !== null) var t = q.options[answers[qi]].taboo; if (t !== 'healthy') scores[t]++;
  });
  primaryResult = Object.keys(scores).reduce((a,b) => scores[a] >= scores[b] ? a : b);
}

function submitAndShowResults() {
  var name = document.getElementById('cap-name').value.trim();
  var email = document.getElementById('cap-email').value.trim();

  if (email) {
    try {
      // Fill in the hidden Flodesk form fields
      var fdForm = document.getElementById('fd-form-69d18ea9808a53aa46a4a7e4');
      if (fdForm) {
        var nameField = fdForm.querySelector('input[name="firstName"], input[placeholder*="name"], input[placeholder*="Name"]');
        var emailField = fdForm.querySelector('input[name="email"], input[type="email"]');
        var submitBtn = fdForm.querySelector('button[type="submit"], button');
        
        if (nameField) {
          nameField.value = name;
          nameField.dispatchEvent(new Event('input', { bubbles: true }));
          nameField.dispatchEvent(new Event('change', { bubbles: true }));
        }
        if (emailField) {
          emailField.value = email;
          emailField.dispatchEvent(new Event('input', { bubbles: true }));
          emailField.dispatchEvent(new Event('change', { bubbles: true }));
        }
        
        // Wait for React state to update then submit
        setTimeout(function() {
          if (submitBtn) submitBtn.click();
        }, 500);
      }
    } catch(e) {
      console.log('Flodesk error:', e);
    }

    // Also try direct API as backup
    var segmentMap = {
      quediran: '69d07b5b4a086815315a42e1',
      bajale: '69d07e86808a53aa46a4a2c7',
      trapos: '69d07f512b1eab093cf9a6ab',
      deso: '69d07ee576c57748dd1b22bc',
      lucha: '69d07f16dfa5e57e528bf576',
      madre: '69d07f5ca5aa26637485ea45'
    };
    var segment = segmentMap[primaryResult] || '69d07b5b4a086815315a42e1';
    
    // Submit to Flodesk via REST API with authentication
    var segmentId = segment;
    var apiKey = 'fd_key_af97bfc953a84af3ba3f6fa80f155630.W1rAx5Q8ddBTzWuMQQJK5ILbz9fqKaGIEB2OzmyduIAZuLwsaXkoSc4kSf8ZqPPdMu4IvpUHlQVHbJ2DfMrFwQVfZjjHRs4a6WTg6CtBnXoSBQCevoptRJhOVjd4lgw9S9mCS5SvzP8btSqfqY4IzC3ZsQOpmnCbeOdsnjPjYNs3tysWx7jUgB6EqHTScNpk';
    
    fetch('https://api.flodesk.com/v1/subscribers', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Basic ' + btoa(apiKey + ':')
      },
      body: JSON.stringify({
        email: email,
        first_name: name,
        segment_ids: [segmentId, '69d02cdbdfa5e57e528bf3e6']
      })
    }).then(function(r) {
      console.log('Flodesk API status:', r.status);
      return r.json();
    }).then(function(data) {
      console.log('Flodesk response:', JSON.stringify(data));
    }).catch(function(e) {
      console.log('Flodesk error:', e);
    });
  }

  showResults();
}

function showResults() {
  show('screen-results');
  const t = taboos[primaryResult];
  document.getElementById('res-taboo-phrase').textContent = t.phrase;
  document.getElementById('res-name').textContent = t.name;
  document.getElementById('res-desc').textContent = t.desc;
  document.getElementById('res-next').textContent = t.next;

  const patternsDiv = document.getElementById('res-patterns');
  patternsDiv.innerHTML = '';
  t.patterns.forEach(p => {
    const d = document.createElement('div');
    d.className = 'pattern-card';
    d.textContent = p;
    patternsDiv.appendChild(d);
  });

  const barsDiv = document.getElementById('res-score-bars');
  barsDiv.innerHTML = '';
  const maxScore = Math.max(...Object.values(scores)) || 1;
  tabooOrder.forEach(key => {
    const row = document.createElement('div');
    row.className = 'score-row';
    const pct = Math.round((scores[key]/maxScore)*100);
    row.innerHTML = `<div class="score-label">${tabooShortNames[key]}</div><div class="score-track"><div class="score-fill" id="bar-${key}" style="width:0%"></div></div><div class="score-num">${scores[key]}</div>`;
    barsDiv.appendChild(row);
  });
  setTimeout(() => {
    tabooOrder.forEach(key => {
      const pct = Math.round((scores[key]/maxScore)*100);
      const el = document.getElementById(`bar-${key}`);
      if (el) el.style.width = pct + '%';
    });
  }, 150);
}

function shareQuiz() {
  const text = 'Take this quiz by @denisesolercox, it names the cultural rule that’s been running your life before you even knew it had a hold on you.\n\ndenisesolercox.com/tabooquiz';
  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Copied! Share it anywhere.'));
  }
}

function shareResult() {
  const t = taboos[primaryResult];
  const text = `I just took the "Which Cultural Taboo Is Running Your Life?" quiz by @denisesolercox\n\nMy result: ${t.phrase}, ${t.name}\n\nThere are 10 cultural taboos in the book. I just found my primary one.\n\nTake the quiz: denisesolercox.com`;
  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Result copied! Paste it anywhere.'));
  }
}

function retakeQuiz() {
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  scores = {};
  primaryResult = null;
  show('screen-intro');
}

// Reinitialize all buttons after Carrd loads
window.addEventListener('load', function() {
  var startBtn = document.querySelector('[onclick="startQuiz()"]');
  if (startBtn) {
    startBtn.onclick = null;
    startBtn.addEventListener('click', startQuiz);
  }
  var nextBtn = document.getElementById('next-btn');
  if (nextBtn) {
    nextBtn.onclick = null;
    nextBtn.addEventListener('click', nextQuestion);
  }
  var backBtn = document.getElementById('back-btn');
  if (backBtn) {
    backBtn.onclick = null;
    backBtn.addEventListener('click', prevQuestion);
  }
  console.log('Quiz initialized');
});
</script>
</body>
</html>
